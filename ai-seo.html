<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Keyword Tool - Istikmal Syariah</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; text-align:center; }
input, button { padding:14px; margin:10px; border-radius:12px; width:80%; max-width:500px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:600; cursor:pointer; }
.result { background:rgba(255,255,255,0.1); padding:25px; border-radius:16px; margin:25px auto; max-width:700px; text-align:left; display:none; }
</style>
</head>
<body>
<h2>🚀 SEO Keyword Tool - Istikmal Syariah</h2>
<input type="text" id="keyword" placeholder="Masukkan kata kunci (contoh: karyawan pabrik)">
<button onclick="generateSEO()">Cari Keyword + Ide Konten</button>

<div id="result" class="result"></div>
<a href="index.html" style="display:block; text-align:center; margin-top:30px; color:#a8e6cf;">← Kembali ke Menu</a>

<script>
function generateSEO() {
  const kw = document.getElementById('keyword').value.trim();
  if (!kw) return alert('Masukkan kata kunci dulu!');

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <h3>🔍 Hasil untuk: <strong>${kw}</strong></h3>
    
    <h4>Keyword Utama & Variasi:</h4>
    <ul>
      <li>${kw}</li>
      <li>${kw} istikmal syariah</li>
      <li>nabung syariah ${kw}</li>
      <li>persiapan masa depan ${kw}</li>
      <li>${kw} umroh syariah</li>
    </ul>
    
    <h4>Ide Judul Postingan Facebook:</h4>
    <ul>
      <li>"Takut Kena PHK? ${kw} Harus Siapkan Masa Depan Sekarang!"</li>
      <li>"Cara ${kw} Menyiapkan Umroh dengan Nabung Syariah"</li>
      <li>"${kw} Bisa Nabung untuk Umroh? Ini Solusi Istikmal Syariah 3IReborn"</li>
      <li>"Rahasia ${kw} yang Sudah Aman Masa Depannya dengan Istikmal Syariah"</li>
      <li>"Dari ${kw} ke Calon Jamaah Umroh - Kisah Nyata Istikmal Syariah"</li>
    </ul>
    
    <p><strong>Tips SEO:</strong> Gunakan hashtag #IstikmalSyariah #3IReborn #NabungUmroh</p>
  `;
}
</script>
</body>
</html>
