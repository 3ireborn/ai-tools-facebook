<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospek Istikmal Syariah - 3IReborn</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; }
.container { max-width: 800px; margin: 0 auto; }
h2 { text-align: center; color: #a8e6cf; }
input, textarea, button { width:100%; max-width:700px; margin:10px auto; display:block; padding:14px; border-radius:12px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:700; font-size:1.1rem; cursor:pointer; }
button:hover { transform:scale(1.05); }
.result { background:rgba(255,255,255,0.1); padding:25px; border-radius:16px; margin:25px auto; text-align:left; display:none; }
.copy-btn { background:#4caf50; margin-top:5px; }
</style>
</head>
<body>
<div class="container">
  <h2>🎯 Prospek Istikmal Syariah Generator</h2>
  <p style="text-align:center;">3IReborn - Nabung untuk Umroh & Masa Depan</p>

  <input type="text" id="target" placeholder="Target Prospek (contoh: muslimah 30-42 tahun ibu rumah tangga)">
  <button onclick="generateProspek()">🚀 GENERATE BAHAN PROSPEK</button>

  <div id="result" class="result"></div>
  <a href="index.html" style="display:block; text-align:center; margin-top:30px; color:#a8e6cf;">← Kembali</a>
</div>

<script>
function generateProspek() {
  const target = document.getElementById('target').value.trim() || "keluarga Muslim usia produktif";
  
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <h3>✅ Bahan Prospek untuk: <strong>${target}</strong></h3>
    
    <h4>1. Caption Postingan (Pilih salah satu)</h4>
    <p><strong>Caption A:</strong><br>
    "Assalamualaikum, apakah Anda ingin mempersiapkan Umroh keluarga sambil menabung Syariah?<br>
    Istikmal Syariah 3IReborn hadir sebagai solusi. Nabung 5-7 tahun, dana kembali penuh + profit halal.<br>
    DM untuk info lebih lanjut 🤲"</p>
    
    <button class="copy-btn" onclick="copyText(this)">Copy Caption A</button>
    
    <h4>2. Script DM (Langsung Copy)</h4>
    <p><strong>DM 1 (Pembuka):</strong><br>
    "Assalamualaikum kak, saya dari 3IReborn. Melihat kakak tertarik dengan perencanaan keuangan Syariah, boleh saya share program Istikmal untuk Umroh?"</p>
    <button class="copy-btn" onclick="copyText(this)">Copy DM 1</button>
    
    <h4>3. Pertanyaan Kualifikasi Prospek</h4>
    <ul>
      <li>Sudah punya rencana Umroh atau Haji?</li>
      <li>Berapa target dana yang ingin disiapkan?</li>
      <li>Apakah tertarik dengan program Syariah yang halal & aman?</li>
    </ul>
  `;
}

function copyText(btn) {
  const text = btn.previousElementSibling ? btn.previousElementSibling.innerText : btn.parentElement.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.innerText;
    btn.innerText = "✅ Copied!";
    setTimeout(() => btn.innerText = original, 2000);
  });
}
</script>
</body>
</html>
