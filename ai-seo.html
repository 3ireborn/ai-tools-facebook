<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Keyword Tool - Istikmal Syariah</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; text-align:center; }
input, button { padding:14px; margin:10px; border-radius:12px; width:80%; max-width:500px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:600; cursor:pointer; }
.result { background:rgba(255,255,255,0.1); padding:25px; border-radius:16px; margin:25px auto; max-width:700px; text-align:left; display:none; }
</style>
</head>
<body>
<h2>🚀 SEO Keyword Tool - Istikmal Syariah</h2>
<p>Masukkan topik yang ingin dibuat kontennya</p>
<input type="text" id="keyword" placeholder="Contoh: istikmal syariah, nabung umroh, phk karyawan">
<button onclick="generateSEO()">Cari Keyword + Ide Konten</button>

<div id="result" class="result"></div>
<a href="index.html" style="display:block; text-align:center; margin-top:30px; color:#a8e6cf;">← Kembali ke Menu</a>

<script>
function generateSEO() {
  const kw = document.getElementById('keyword').value.trim();
  if (!kw) return alert('Masukkan topik dulu!');

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <h3>🔍 Hasil Keyword untuk: <strong>${kw}</strong></h3>
    
    <h4>Keyword Utama & Variasi:</h4>
    <ul>
      <li>${kw}</li>
      <li>istikmal syariah 3ireborn</li>
      <li>nabung umroh syariah</li>
      <li>investasi halal umroh</li>
      <li>persiapan pensiun syariah</li>
    </ul>
    
    <h4>Ide Judul Postingan Facebook:</h4>
    <ul>
      <li>"Kenapa Harus Istikmal Syariah? Ini Bedanya dengan Tabungan Biasa"</li>
      <li>"Takut Kena PHK? Begini Cara Menyiapkan Masa Depan Keluarga"</li>
      <li>"Nabung 5-7 Tahun untuk Umroh, Bisa! Begini Caranya"</li>
      <li>"Dana Kembali Penuh + Profit Halal, Mau?"</li>
    </ul>
    
    <p><strong>Tips:</strong> Gunakan hashtag #IstikmalSyariah #3IReborn #NabungUmroh</p>
  `;
}
</script>
</body>
</html>
