<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Keyword Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #001f3f, #003366); color: white; margin:0; padding:20px; text-align:center; }
input, button { padding:14px; margin:10px; border-radius:12px; width:80%; max-width:500px; }
button { background: linear-gradient(90deg, #00b4d8, #0077b6); color:white; font-weight:600; cursor:pointer; }
.result { background:rgba(255,255,255,0.1); padding:25px; border-radius:16px; margin:25px auto; max-width:700px; text-align:left; display:none; }
</style>
</head>
<body>
<h2>🚀 SEO Keyword Tool</h2>
<input type="text" id="keyword" placeholder="Masukkan topik produk (contoh: skincare whitening)">
<button onclick="generateSEO()">Cari Keyword + Ide</button>
<div id="result" class="result"></div>
<a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#00b4d8;">← Kembali ke Menu</a>

<script>
function generateSEO() {
  const kw = document.getElementById('keyword').value.trim();
  if (!kw) return alert('Masukkan keyword dulu!');
  
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <h3>🔍 Hasil untuk: <strong>${kw}</strong></h3>
    <p><strong>Keyword Utama:</strong> ${kw}</p>
    <p><strong>Keyword Lainnya:</strong></p>
    <ul>
      <li>${kw} terbaik 2026</li>
      <li>cara pakai ${kw}</li>
      <li>review ${kw}</li>
      <li>${kw} original</li>
    </ul>
    <p><strong>Ide Judul Postingan:</strong> "10 Rekomendasi ${kw} Terbaik & Terlaris Tahun Ini"</p>
  `;
}
</script>
</body>
</html>
