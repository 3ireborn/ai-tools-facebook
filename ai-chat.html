<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Assistant - Istikmal Syariah</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { 
  font-family: 'Poppins', sans-serif; 
  background: linear-gradient(135deg, #001f3f, #003366); 
  color: white; 
  margin:0; 
  padding:20px; 
}
.container { max-width: 700px; margin: 0 auto; }
h2 { text-align: center; }
textarea { 
  width:100%; 
  height: 150px; 
  padding:14px; 
  border-radius:12px; 
  margin-bottom:10px;
}
button { 
  width:100%; 
  padding:14px; 
  background: linear-gradient(90deg, #00b4d8, #0077b6); 
  color:white; 
  font-weight:700; 
  border:none; 
  border-radius:12px; 
  cursor:pointer; 
}
button:hover { transform: scale(1.03); }
.response { 
  background:rgba(255,255,255,0.1); 
  padding:20px; 
  border-radius:12px; 
  margin-top:20px; 
  text-align:left; 
  display:none; 
}
</style>
</head>
<body>
<div class="container">
  <h2>💬 AI Chat Assistant - Istikmal Syariah</h2>
  <p style="text-align:center; opacity:0.9;">Tanya apa saja seputar prospek, konten, atau Istikmal</p>

  <textarea id="prompt" placeholder="Contoh: Buat caption untuk karyawan yang takut PHK..."></textarea>
  <button onclick="sendChat()">🚀 Kirim Pertanyaan</button>

  <div id="result" class="response"></div>

  <a href="index.html" style="display:block; text-align:center; margin-top:30px; color:#a8e6cf;">← Kembali ke Menu</a>
</div>

<script>
function sendChat() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return alert('Tulis pertanyaan dulu!');

  const result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = `
    <strong>Pertanyaan:</strong><br>${prompt}<br><br>
    <strong>Jawaban AI:</strong><br>
    Berikut jawaban dan saran untuk Istikmal Syariah 3IReborn.<br><br>
    (Versi demo - di versi lengkap akan lebih detail dan akurat)
  `;
}
</script>
</body>
</html>
